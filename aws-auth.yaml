apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system
data:
  mapRoles: |
    # CodeBuild role for deploying to EKS
    - rolearn: arn:aws:iam::719737572889:role/codebuild-deploy-to-eks-service-role
      username: codebuild-deployer
      groups:
        - system:masters

    # EC2 NodeInstanceRole (EKS worker nodes)
    - rolearn: arn:aws:iam::719737572889:role/AmazonEKSAutoNodeRole
      username: system:node:{{EC2PrivateDNSName}}
      groups:
        - system:bootstrappers
        - system:nodes


apiVersion: v1
data:
  mapRoles: |
    - groups:
      - system:bootstrappers
      - system:nodes
      # This 'rolearn' MUST be your EKS Node Instance Role ARN.
      rolearn: <PASTE_YOUR_EKS_NODE_INSTANCE_ROLE_ARN_HERE> # <--- REPLACE THIS PLACEHOLDER
      username: system:node:{{EC2PrivateDNSName}}
    - groups:
      - system:masters
      # This 'rolearn' is for your CodeBuild deployment role.
      rolearn: arn:aws:iam::719737572889:role/service-role/codebuild-Brain-Tasks07-service-role
      username: codebuild-Brain-Tasks07-service-role

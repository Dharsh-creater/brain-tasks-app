version: 0.2

phases:
  install:
    commands:
      # Install kubectl
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl
      # Install aws-iam-authenticator
      - curl -LO "https://github.com/kubernetes-sigs/aws-iam-authenticator/releases/download/v0.6.11/aws-iam-authenticator_0.6.11_linux_amd64"
      - chmod +x ./aws-iam-authenticator_0.6.11_linux_amd64
      - mv ./aws-iam-authenticator_0.6.11_linux_amd64 /usr/local/bin/aws-iam-authenticator
      - aws --version # Verify AWS CLI is installed

  pre_build:
    commands:
      - echo "Updating kubeconfig for EKS cluster..."
      - EKS_CLUSTER_NAME="brain-tasks-cluster"
      - AWS_REGION="us-east-1"
      - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
      - echo "Verifying AWS Caller Identity..."
      - aws sts get-caller-identity
      - echo "Caller Identity Verified. Applying Kubernetes deployment and service..."

  build:
    commands:
      - echo "Applying Kubernetes deployment and service..."
      - kubectl apply -f kubernetes/deployment.yaml

  post_build:
    commands:
      - echo "Deployment complete. Checking service status..."
      - kubectl get service brain-tasks-app-service # Simplified this line for testing
      - echo "End of post-build phase." # Simplified this line for testing

artifacts:
  files:
    - '**/*'

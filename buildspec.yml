version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 719737572889.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t simple-docker-service .
  post_build:
    commands:
      - echo Tagging image...
      - docker tag simple-docker-service:latest 719737572889.dkr.ecr.us-east-1.amazonaws.com/simple-docker-service:latest
      - echo Pushing the Docker image...
      - docker push 719737572889.dkr.ecr.us-east-1.amazonaws.com/simple-docker-service:latest

artifacts:
  files: '**/*'


version: 0.2

phases:
  install:
    commands:
      - echo "Installing jq..."
      - yum install -y jq

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 719737572889.dkr.ecr.us-east-1.amazonaws.com

      - echo "Retrieving Docker Hub credentials from Secrets Manager..."
      - SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id dockerhub/credentials --region us-east-1 --query SecretString --output text)
      - DOCKERHUB_USERNAME=$(echo $SECRET_JSON | jq -r '.DOCKERHUB_USERNAME')
      - DOCKERHUB_PASSWORD=$(echo $SECRET_JSON | jq -r '.DOCKERHUB_PASSWORD')

      - echo "Logging in to Docker Hub..."
      - echo "$DOCKERHUB_PASSWORD" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest 719737572889.dkr.ecr.us-east-1.amazonaws.com/brain-tasks-app:latest
      - docker tag brain-tasks-app:latest $DOCKERHUB_USERNAME/brain-tasks-app:latest

  post_build:
    commands:
      - echo "Pushing to Amazon ECR..."
      - docker push 719737572889.dkr.ecr.us-east-1.amazonaws.com/brain-tasks-app:latest

      - echo "Pushing to Docker Hub..."
      - docker push $DOCKERHUB_USERNAME/brain-tasks-app:latest

